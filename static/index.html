<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimpOrganizer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="ewolf.png" alt="Logo" class="logo">
                <button class="sidebar-toggle" id="sidebar-toggle-btn" aria-label="Navigation umschalten">☰</button>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="view-overview">
                    <span class="nav-icon">📁</span>
                    <span class="nav-label">Crimpanweisungen</span>
                </button>
                <button class="nav-item" data-view="view-editor">
                    <span class="nav-icon">➕</span>
                    <span class="nav-label">Vorlage anlegen</span>
                </button>
                <button class="nav-item" data-view="view-orders">
                    <span class="nav-icon">🖨️</span>
                    <span class="nav-label">Gedruckte Aufträge</span>
                </button>
                <button class="nav-item" id="btn-settings-nav">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-label">Einstellungen</span>
                </button>
                <button class="nav-item" id="btn-update-nav">
                    <span class="nav-icon">🔄</span>
                    <span class="nav-label">Update</span>
                </button>
            </nav>
        </aside>

        <!-- Main Workspace (Views loaded dynamically) -->
        <main class="main-content">
            <!-- Loading state indicator -->
            <div id="app-loading-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px;">
                <span class="spinner" style="display: inline-block; width: 48px; height: 48px; border: 4px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></span>
                <p style="color: var(--text-secondary); font-weight: 500;">Anwendung wird geladen...</p>
            </div>
        </main>
    </div>

    <!-- JavaScript entry point -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
